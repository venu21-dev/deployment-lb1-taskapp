# Docker Compose – C1: Multi-Service Architektur
# Startet drei Services: Frontend (Nginx), Backend (Node.js), Datenbank (PostgreSQL)
#
# Starten:  docker compose up --build
# Stoppen:  docker compose down
# Logs:     docker compose logs -f

services:

  # ── 1. Frontend: Nginx liefert HTML/CSS/JS aus und proxyt /api an Backend ──
  frontend:
    build: ./frontend
    ports:
      - "8080:80"            # http://localhost:8080 im Browser öffnen
    networks:
      - frontend-network
    depends_on:
      backend:
        condition: service_healthy   # wartet, bis das Backend-Healthcheck grün ist
    restart: unless-stopped

  # ── 2. Backend: Node.js / Express API ─────────────────────────────────────
  backend:
    build: ./backend
    environment:
      PORT:        3000
      APP_NAME:    ${APP_NAME}
      APP_VERSION: ${APP_VERSION}
      DB_HOST:     postgres          # Service-Name = Hostname im Docker-Netzwerk
      DB_PORT:     ${DB_PORT}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME:     ${DB_NAME}
    networks:
      - frontend-network             # Frontend kann Backend erreichen
      - backend-network              # Backend kann PostgreSQL erreichen
    depends_on:
      postgres:
        condition: service_healthy   # wartet, bis PostgreSQL bereit ist
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── 3. Datenbank: PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data   # Daten bleiben nach Neustart erhalten
    networks:
      - backend-network              # nur Backend kann auf DB zugreifen
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

# ── Persistenter Speicher ──────────────────────────────────────────────────
volumes:
  postgres-data:                     # benanntes Volume – Daten überleben Container-Neustarts

# ── Netzwerke ─────────────────────────────────────────────────────────────
networks:
  frontend-network:                  # verbindet Frontend ↔ Backend
    driver: bridge
  backend-network:                   # verbindet Backend ↔ PostgreSQL
    driver: bridge
