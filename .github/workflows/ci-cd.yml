name: CI/CD Pipeline

# Auslöser: bei jedem Push auf main und manuell über GitHub UI
on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN Berechtigungen:
# - contents: read  → Code auschecken
# - packages: write → Image in GHCR pushen
permissions:
  contents: read
  packages: write

jobs:

  # ── Stage 1: Tests ────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js 24 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json   # npm Cache für schnellere Builds

      - name: Abhängigkeiten installieren
        run: npm ci
        working-directory: backend

      - name: Tests ausführen
        run: npm test
        working-directory: backend

  # ── Stage 2 & 3: Docker Image bauen und in GHCR pushen ───────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test   # läuft NUR wenn Stage 1 (Test) erfolgreich war

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Bei GitHub Container Registry (GHCR) anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # kein manuelles Secret nötig

      - name: Backend-Image bauen und pushen
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-backend:latest
            ghcr.io/${{ github.repository }}-backend:${{ github.sha }}
          cache-from: type=gha          # Docker Layer Cache aus GitHub Actions Cache lesen
          cache-to: type=gha,mode=max   # Docker Layer Cache in GitHub Actions Cache speichern
