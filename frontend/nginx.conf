# Nginx-Konfiguration für das Frontend
# Liefert statische Dateien aus und leitet /api/* an das Backend weiter

user  nginx;
worker_processes  auto;
error_log  /dev/stderr warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Strukturiertes JSON-Zugriffslog – jede Anfrage als JSON-Zeile auf stdout
    log_format json_log escape=json
        '{"timestamp":"$time_iso8601",'
        '"level":"info",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"remote_addr":"$remote_addr"}';

    access_log /dev/stdout json_log;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;

        # Statisches Frontend aus diesem Ordner bereitstellen
        root  /usr/share/nginx/html;
        index index.html;

        # /api/* Anfragen an das Backend weiterleiten (Reverse Proxy)
        # "backend" ist der Service-Name aus docker-compose.yml
        location /api/ {
            proxy_pass         http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # Alle anderen Anfragen → statische Dateien
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
